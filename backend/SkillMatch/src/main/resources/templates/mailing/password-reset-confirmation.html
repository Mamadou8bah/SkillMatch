<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful - SkillMatch</title>
    <style>
        body {
            font-family: 'Montserrat', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #0f1419;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f7f7f7;
            padding-bottom: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-top: 40px;
        }
        .header {
            background-color: #ffffff;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #eff3f4;
        }
        .logo {
            max-width: 180px;
            height: auto;
        }
        .content {
            padding: 40px 30px;
            text-align: center;
        }
        .success-icon {
            font-size: 64px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .greeting {
            font-size: 24px;
            font-weight: 700;
            color: #0f1419;
            margin-bottom: 20px;
        }
        .message {
            font-size: 16px;
            color: #3d4952;
            margin-bottom: 30px;
        }
        .footer {
            padding: 30px;
            text-align: center;
            font-size: 13px;
            color: #71767b;
            background-color: #ffffff;
            border-top: 1px solid #eff3f4;
        }
        @media screen and (max-width: 600px) {
            .container {
                width: 95%;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <img th:src="${logoUrl}" alt="SkillMatch" class="logo">
            </div>

            <div class="content">
                <div class="success-icon">✓</div>
                <div class="greeting">Password Reset Successful</div>
                <div class="message">
                    Hi <span th:text="${firstName}">User</span>, <br>
                    Your password has been successfully updated. You can now log in to your account with your new credentials.
                </div>
            </div>

            <div class="footer">
                <p>&copy; 2026 SkillMatch. All rights reserved.</p>
                <p>Ensuring security and transparency in every match.</p>
            </div>
        </div>
    </div>
</body>
</html>
